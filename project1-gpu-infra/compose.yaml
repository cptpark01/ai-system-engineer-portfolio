services:
  ai-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-api
    ports:
      - "8000:8000"
    environment:
      - TRANSFORMERS_CACHE=/models/cache
      - HF_HOME=/models/cache
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped