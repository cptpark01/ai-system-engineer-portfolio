name: Project 2 CI

on:
  push:
    paths:
      - "project2-mlops/**"
      - ".github/workflows/project2-ci.yml"
  pull_request:
    paths:
      - "project2-mlops/**"

jobs:
  build-serving-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build serving API Docker image
        working-directory: project2-mlops
        run: |
          docker build -t project2-serving-api -f serving/Dockerfile .

      - name: Validate docker compose config
        working-directory: project2-mlops
        run: |
          docker compose config
